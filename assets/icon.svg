<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)" />
  <!-- Main favicon - 4 squares representing multi-resolution ICO -->
  <g transform="translate(64, 64)">
    <rect x="-30" y="-30" width="26" height="26" rx="5" fill="white" fill-opacity="0.85" />
    <rect x="2" y="-30" width="26" height="26" rx="5" fill="white" fill-opacity="0.85" />
    <rect x="-30" y="2" width="26" height="26" rx="5" fill="white" fill-opacity="0.85" />
    <rect x="2" y="2" width="26" height="26" rx="5" fill="white" />
    <!-- Sparkle - generation indicator -->
    <path d="M15 5 L16 2 L17 5 L20 6 L17 7 L16 10 L15 7 L12 6 Z" fill="url(#bg)" />
  </g>
  <!-- Subtle shine overlay -->
  <rect width="128" height="128" rx="24" fill="url(#shine)" />
</svg>